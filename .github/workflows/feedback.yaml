# This is a GitHub Action workflow that automates feedback for Java assignments.
# It is designed to be used with GitHub Classroom.
#
# How it works:
# 1. It triggers when a "feedback" pull request is opened or updated.
# 2. It reads the assignment instructions from the README.md file.
# 3. It gathers all the Java source code from the `src/main/java` directory.
# 4. It gathers all the Java test code from the `src/test/java` directory.
# 5. It sends the instructions, source code, and test code to an LLM on OpenRouter.
# 6. The LLM generates feedback based on the provided information.
# 7. The feedback is then posted as a comment on the pull request.

name: AI-Powered Feedback

on:
  pull_request:
    types: [opened, synchronize]
    branches:
      - feedback

jobs:
  provide_feedback:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Read assignment instructions
        id: instructions
        run: |
          # Reads the content of the README.md file into an output variable.
          # The `EOF` marker is used to handle multi-line file content.
          echo "instructions=$(cat README.md | sed 's/\"/\\\"/g' | sed 's/$/\\n/' | tr -d '\n' | sed 's/\\n/\\\\n/g')" >> $GITHUB_OUTPUT

      - name: Read source code
        id: source_code
        run: |
          # Finds all .java files in the src/main/java directory and its subdirectories,
          # then concatenates their content into a single string.
          echo "source_code=$(find src/main/java -name "*.java" -print0 | xargs -0 cat | sed 's/\"/\\\"/g' | sed 's/$/\\n/' | tr -d '\n' | sed 's/\\n/\\\\n/g')" >> $GITHUB_OUTPUT

      - name: Read test code
        id: test_code
        run: |
          # Finds all .java files in the src/test/java directory and its subdirectories,
          # then concatenates their content into a single string.
          # It includes an error check in case the directory doesn't exist.
          if [ -d "src/test/java" ]; then
            echo "test_code=$(find src/test/java -name "*.java" -print0 | xargs -0 cat | sed 's/\"/\\\"/g' | sed 's/$/\\n/' | tr -d '\n' | sed 's/\\n/\\\\n/g')" >> $GITHUB_OUTPUT
          else
            echo "test_code=No test code found." >> $GITHUB_OUTPUT
          fi

      - name: Generate AI Feedback
        id: ai_feedback
        run: |
          # This step sends the collected data to the OpenRouter API.
          # You need to replace 'YOUR_MODEL' with the model you wish to use.
          # The prompt is structured to give the AI clear instructions on its role and task.
          API_RESPONSE=$(curl https://openrouter.ai/api/v1/chat/completions \
            -H "Authorization: Bearer ${{ secrets.OPENROUTER_API_KEY }}" \
            -H "Content-Type: application/json" \
            -d '{
              "model": "qwen/qwen3-235b-a22b-2507:free",
              "messages": [
                {"role": "system", "content": "You are an expert Java programming instructor providing feedback on a student''s assignment. Your feedback should be constructive, helpful, and encouraging. Analyze the code for correctness, style, and adherence to the instructions. If there are tests, evaluate them as well. Structure your feedback in Markdown format."},
                {"role": "user", "content": "Please provide feedback on the following Java assignment.\n\n**Assignment Instructions:**\n${{ steps.instructions.outputs.instructions }}\n\n**Student''s Source Code:**\n```java\n${{ steps.source_code.outputs.source_code }}\n```\n\n**Student''s Test Code:**\n```java\n${{ steps.test_code.outputs.test_code }}\n```"}
              ]
            }')

          # Extracts the content from the JSON response.
          FEEDBACK_CONTENT=$(echo $API_RESPONSE | jq -r '.choices[0].message.content')
          # The `EOF` marker is used to handle multi-line content for the output variable.
          echo "feedback<<EOF" >> $GITHUB_OUTPUT
          echo "$FEEDBACK_CONTENT" >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT

      - name: Post Feedback as PR Comment
        uses: actions/github-script@v7
        env:
          # Pass the feedback as an environment variable to avoid syntax errors
          # with special characters like backticks.
          FEEDBACK_BODY: ${{ steps.ai_feedback.outputs.feedback }}
        with:
          github-token: ${{secrets.GITHUB_TOKEN}}
          script: |
            // Read the feedback from the environment variable.
            const feedback = process.env.FEEDBACK_BODY;
            
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: feedback
            });
